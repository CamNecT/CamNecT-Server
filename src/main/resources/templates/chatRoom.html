<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        /* [기본 설정] */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #F2F4F6; /* 앱 배경색 */
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        /* [모바일 컨테이너] */
        .mobile-container {
            width: 100%;
            max-width: 480px; /* 모바일 최대 너비 */
            background-color: #ffffff;
            height: 100%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        /* [헤더] */
        .chat-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f1f1;
            background: white;
            z-index: 10;
        }

        .header-title {
            font-weight: 700;
            font-size: 18px;
        }

        .icon-btn {
            font-size: 20px;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* [프로필 섹션] */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 20px;
            background: white;
        }

        .profile-img {
            width: 80px;
            height: 80px;
            background-color: #ddd;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .profile-info {
            font-size: 13px;
            color: #888;
            margin-bottom: 15px;
        }

        .profile-tags {
            display: flex;
            gap: 6px;
        }

        .tag-pill {
            font-size: 12px;
            color: #26C281; /* 초록색 텍스트 */
            border: 1px solid #26C281;
            padding: 4px 10px;
            border-radius: 20px;
            background: #fff;
        }

        /* [채팅 영역] */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* [요청 내역 카드 (중요)] */
        .request-card {
            border: 1px solid #E5E8EB;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            background-color: #FAFAFA;
        }

        .card-label {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #333;
        }

        .card-tags {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .card-content {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }

        /* [날짜 구분선] */
        .date-divider {
            text-align: center;
            font-size: 12px;
            color: #aaa;
            margin: 10px 0;
        }

        /* [메시지 스타일] */
        .msg-row {
            display: flex;
            width: 100%;
            align-items: flex-end;
        }

        /* 상대방 메시지 */
        .msg-row.other {
            justify-content: flex-start;
        }

        .msg-row.other .sender-profile {
            width: 36px;
            height: 36px;
            background: #ddd;
            border-radius: 50%;
            margin-right: 10px;
        }

        .msg-row.other .bubble {
            background-color: #F2F4F6;
            color: #333;
            border-radius: 2px 18px 18px 18px; /* 말풍선 모양 */
        }

        /* 내 메시지 */
        .msg-row.mine {
            justify-content: flex-end;
        }

        .msg-row.mine .bubble {
            background-color: #5ACA73; /* 디자인의 초록색 */
            color: white;
            border-radius: 18px 2px 18px 18px;
        }

        /* 공통 말풍선 */
        .bubble {
            padding: 10px 14px;
            max-width: 70%;
            font-size: 14px;
            word-wrap: break-word;
            position: relative;
        }

        .msg-time {
            font-size: 10px;
            color: #aaa;
            margin: 0 5px;
            margin-bottom: 2px;
        }

        /* 숫자 1 (읽음 확인) */
        .unread {
            color: #5ACA73; /* 초록색 숫자 */
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 2px;
            margin-right: 2px;
        }

        /* [입력창] */
        .input-area {
            padding: 10px 15px;
            background: white;
            border-top: 1px solid #f1f1f1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .plus-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #eee;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #msg {
            flex: 1;
            background: #F2F4F6;
            border: none;
            border-radius: 20px;
            padding: 10px 15px;
            font-size: 14px;
            outline: none;
        }

        .send-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: #5ACA73;
        }

    </style>
</head>

<body>

<div class="mobile-container">
    <div class="chat-header">
        <button class="icon-btn" onclick="history.back()">＜</button>
        <span class="header-title" th:text="${room.opponentName}">상대방이름</span>
        <div style="width: 24px;"></div>
    </div>

    <div id="msgArea" class="chat-box">

        <div class="profile-section">
            <div class="profile-img"></div>
            <div class="profile-name" th:text="${room.opponentName}">김갑수</div>
            <div class="profile-info">
                <span th:text="${room.opponentMajor}">시각디자인학과</span>
                <span th:text="${room.opponentStudentYear}">19학번</span>
            </div>
            <div class="profile-tags" th:if="${not #lists.isEmpty(room.opponentTags)}">
                <span class="tag-pill" th:each="tag : ${room.opponentTags}" th:text="${tag}">UX&UI</span>
            </div>
        </div>

        <div class="date-divider">1월 15일 수요일</div>
        <div class="request-card">
            <div class="card-label">요청 분야</div>
            <div class="card-tags">
                <span class="tag-pill" th:each="tag : ${room.requestTags}" th:text="${tag}">태그1</span>
            </div>

            <div class="card-label">요청 내용</div>
            <div class="card-content" th:text="${room.requestContent}">
                커피챗을 요청하는 이유와 궁금한 점을 간결하게 작성해주세요.
            </div>
        </div>

        <div th:each="chat : ${chatList}" class="msg-row"
             th:classappend="${chat.senderId == userId} ? 'mine' : 'other'">

            <div class="sender-profile" th:if="${chat.senderId != userId}"></div>

            <th:block th:if="${chat.senderId != userId}">
                <div class="bubble" th:text="${chat.message}">상대방 메시지</div>
                <div class="msg-time" th:text="${#strings.substring(chat.sendDate, 11, 16)}">12:30</div>
            </th:block>

            <th:block th:if="${chat.senderId == userId}">
                <span th:if="${!chat.read}" class="unread" th:id="'unread-' + ${chat.messageId}">1</span>
                <div class="msg-time" th:text="${#strings.substring(chat.sendDate, 11, 16)}">12:32</div>
                <div class="bubble" th:text="${chat.message}">내 메시지</div>
            </th:block>
        </div>

    </div>

    <div class="input-area">
        <button class="plus-btn">＋</button>
        <input type="text" id="msg" placeholder="메시지 보내기..." onkeypress="if(event.keyCode===13) sendMsg()">
        <button class="send-btn" onclick="sendMsg()">전송</button>
    </div>
</div>

<input type="hidden" id="roomId" th:value="${room.roomId}">
<input type="hidden" id="userId" th:value="${userId}">
<input type="hidden" id="opponentId" th:value="${room.opponentId}">

<script>
    const roomId = document.getElementById("roomId").value;
    const userId = parseInt(document.getElementById("userId").value);
    const msgArea = document.getElementById("msgArea");
    let stompClient = null;

    msgArea.scrollTop = msgArea.scrollHeight;

    function connect() {
        const socket = new SockJS("/ws-stomp");
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({userId: userId}, function () {
            stompClient.subscribe("/sub/chat/room/" + roomId, function (message) {
                const data = JSON.parse(message.body);

                // (1) 데이터 타입이 'READ'면 -> 숫자 1 지우기
                if (data.type === "READ") {
                    console.log("읽음 이벤트 수신! 숫자 1 삭제");
                    markAllAsRead();
                }
                // (2) 그 외(TALK)면 -> 채팅 말풍선 그리기
                else {
                    renderMessage(data);
                }
            });
            stompClient.subscribe("/user/queue/read", function (message) {
                markAllAsRead();
            });
        });
    }

    function sendMsg() {
        const input = document.getElementById("msg");
        const msgContent = input.value.trim();
        if (!msgContent) return;

        const chatDto = {
            roomId: parseInt(roomId),
            senderId: userId,
            content: msgContent
        };

        stompClient.send("/pub/chat/message", {}, JSON.stringify(chatDto));
        input.value = "";
    }

    function renderMessage(chat) {
        const row = document.createElement("div");
        row.classList.add("msg-row");

        // 시간 포맷팅 (HH:mm)
        const timeStr = chat.sendDate ? chat.sendDate.substring(11, 16) : new Date().toTimeString().substring(0, 5);

        if (parseInt(chat.senderId) === userId) {
            row.classList.add("mine");
            const unreadHtml = chat.read ? '' : `<span class="unread" id="unread-${chat.messageId}">1</span>`;

            row.innerHTML = `
                ${unreadHtml}
                <div class="msg-time">${timeStr}</div>
                <div class="bubble">${chat.message}</div>
            `;
        } else {
            row.classList.add("other");
            row.innerHTML = `
                <div class="sender-profile"></div>
                <div class="bubble">${chat.message}</div>
                <div class="msg-time">${timeStr}</div>
            `;
        }
        msgArea.appendChild(row);
        msgArea.scrollTop = msgArea.scrollHeight;
    }

    function markAllAsRead() {
        document.querySelectorAll(".unread").forEach(el => el.remove());
    }

    connect();
</script>

</body>
</html>

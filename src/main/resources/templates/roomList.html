<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커피챗 목록</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #F8F9FA;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }
        .mobile-container {
            width: 100%;
            max-width: 480px;
            background-color: #ffffff;
            height: 100%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            position: relative;
        }

        /* 헤더 */
        .top-header {
            padding: 15px 20px;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            position: relative;
            background: white;
            border-bottom: 1px solid #eee;
        }

        /* 탭 메뉴 */
        .tab-menu {
            display: flex;
            background: white;
            border-bottom: 1px solid #f1f1f1;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 15px;
            color: #888;
            cursor: pointer;
            position: relative;
        }
        .tab-item.active {
            color: #333;
            font-weight: 700;
        }
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #6BCB77;
        }

        /* 검색창 */
        .search-area { padding: 15px 20px; background: white; }
        .search-bar {
            width: 100%;
            background-color: #F2F4F6;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 14px;
            color: #888;
        }

        /* 메인 리스트 영역 (스크롤) */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            background: white;
        }

        /* [섹션] 받은 요청 스타일 */
        .section-title {
            padding: 15px 20px 5px;
            font-size: 13px;
            font-weight: bold;
            color: #666;
            background-color: #fff;
        }
        .request-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f9f9f9;
            background: #FAFAFA;
        }
        .req-info { margin-bottom: 8px; font-size: 14px; }
        .req-tag { color: #5ACA73; font-weight: bold; font-size: 12px; margin-right: 5px; }
        .btn-group { display: flex; gap: 8px; }
        .btn-accept {
            background: #6BCB77; color: white; border: none; padding: 6px 12px;
            border-radius: 4px; font-size: 12px; cursor: pointer;
        }
        .btn-reject {
            background: #eee; color: #555; border: none; padding: 6px 12px;
            border-radius: 4px; font-size: 12px; cursor: pointer;
        }

        /* [섹션] 채팅방 리스트 스타일 */
        .room-list {
            padding: 0; margin: 0; list-style: none;
        }
        .room-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f9f9f9;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            text-decoration: none;
            color: inherit;
        }
        .room-item:hover { background-color: #fcfcfc; }

        .item-profile {
            width: 50px; height: 50px; border-radius: 50%;
            background-color: #ddd; flex-shrink: 0;
        }
        .bg-1 { background-color: #9B72EE; }
        .bg-2 { background-color: #FF8896; }
        .bg-3 { background-color: #5ACA73; }

        .item-content {
            flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0;
        }
        .user-info { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .sub-info { font-size: 12px; color: #888; font-weight: 400; margin-left: 5px; }
        .last-msg {
            font-size: 13px; color: #666;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .right-col { display: flex; flex-direction: column; align-items: flex-end; }
        .time-text { font-size: 11px; color: #aaa; margin-bottom: 5px; }

        /* 개별 방 뱃지 */
        .badge {
            background-color: #6BCB77; color: white; font-size: 11px;
            font-weight: bold; padding: 2px 7px; border-radius: 10px;
        }

        /* 하단 탭바 */
        .bottom-nav {
            height: 60px; border-top: 1px solid #eee; background: white;
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            font-size: 10px; color: #aaa; gap: 4px; cursor: pointer;
            position: relative;
        }
        .nav-item.active { color: #6BCB77; }
        .nav-icon { width: 24px; height: 24px; background: #ddd; border-radius: 4px; }
        .nav-icon.active { background: #6BCB77; }

        /* 하단 탭바 전체 뱃지 */
        .global-badge {
            position: absolute;
            top: -2px;
            right: 15px;
            background-color: #FF3B30;
            color: white;
            font-size: 10px;
            font-weight: bold;
            min-width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 2px;
        }

        .debug-area {
            padding: 20px; background: #f0f0f0; margin-top: 20px; border-top: 1px dashed #999;
        }
    </style>
</head>
<body>

<div class="mobile-container">

    <div class="top-header">
        채팅 (내ID: <span th:text="${userId}"></span>)
    </div>

    <div class="tab-menu">
        <div class="tab-item active">커피챗</div>
        <div class="tab-item">팀원 모집</div>
    </div>

    <div class="search-area">
        <div class="search-bar">🔍 채팅방, 대화 내용 검색</div>
    </div>

    <div class="content-scroll">

        <div th:if="${not #lists.isEmpty(requests)}">
            <div class="section-title">📥 받은 요청</div>
            <div th:each="req : ${requests}" class="request-item">
                <div class="req-info">
                    [<span th:each="tag : ${req.requestInterests}" th:text="${tag.name} + ' '" class="req-tag"></span>]
                    <strong th:text="${req.requester.name}">요청자</strong>님이 요청을 보냈습니다.
                    <br>
                    <span style="color:#555; font-size:13px;" th:text="${req.content}">내용</span>
                </div>
                <div class="btn-group">
                    <form action="/request/respond" method="post">
                        <input type="hidden" name="requestId" th:value="${req.id}"/>
                        <input type="hidden" name="userId" th:value="${userId}"/>
                        <input type="hidden" name="isAccepted" value="true"/>
                        <button type="submit" class="btn-accept">수락</button>
                    </form>
                    <form action="/request/respond" method="post">
                        <input type="hidden" name="requestId" th:value="${req.id}"/>
                        <input type="hidden" name="userId" th:value="${userId}"/>
                        <input type="hidden" name="isAccepted" value="false"/>
                        <button type="submit" class="btn-reject">거절</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="section-title">💬 내 채팅방</div>
        <ul class="room-list" id="roomListUl">

            <th:block th:if="${not #lists.isEmpty(roomList)}">
                <li th:each="room, stat : ${roomList}" th:id="'room-' + ${room.roomId}">
                    <a th:href="@{/chat/room/{roomId}(roomId=${room.roomId}, userId=${userId})}" class="room-item">

                        <div class="item-profile"
                             th:classappend="${stat.index % 3 == 0} ? 'bg-1' : (${stat.index % 3 == 1} ? 'bg-2' : 'bg-3')">
                        </div>

                        <div class="item-content">
                            <div class="user-info">
                                <span th:text="${room.opponentName}">상대방</span>
                                <span class="sub-info"
                                      th:text="|${room.opponentMajor} ${room.opponentStudentYear}|">
                                    시각디자인 19학번
                                </span>
                            </div>

                            <div class="last-msg" th:text="${room.lastMessage}">
                                마지막 대화 내용
                            </div>
                        </div>

                        <div class="right-col">
                            <span class="time-text">어제</span>
                            <span class="badge"
                                  th:style="${room.unreadCount > 0 ? '' : 'display:none'}"
                                  th:text="${room.unreadCount}">N</span>
                        </div>
                    </a>
                </li>
            </th:block>

            <li th:if="${#lists.isEmpty(roomList)}"
                style="padding: 40px; text-align: center; color: #888; font-size: 14px;">
                진행 중인 채팅방이 없습니다.
            </li>
        </ul>

        <div class="debug-area">
            <h5>🛠 테스트용 요청 보내기</h5>
            <form action="/request/send" method="post">
                <input type="hidden" name="requesterId" th:value="${userId}">
                받는사람ID: <input type="text" name="receiverId" placeholder="ID 입력" style="width:50px;">
                <br>
                태그:
                <label><input type="checkbox" name="tagIds" value="1"> 1</label>
                <label><input type="checkbox" name="tagIds" value="2"> 2</label>
                <br>
                내용: <input type="text" name="content" placeholder="안녕하세요" style="width:150px;">
                <button type="submit">전송</button>
            </form>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item"><div class="nav-icon"></div>홈</div>
        <div class="nav-item"><div class="nav-icon"></div>동문</div>

        <div class="nav-item active">
            <div class="nav-icon active"></div>
            <span class="global-badge"
                  th:if="${allUnreadCount > 0}"
                  th:text="${allUnreadCount}">
                0
            </span>
            커피챗
        </div>

        <div class="nav-item"><div class="nav-icon"></div>대외활동</div>
        <div class="nav-item"><div class="nav-icon"></div>MY</div>
    </div>

</div>

<script th:inline="javascript">
    /*<![CDATA[*/

    var msg = [[${message}]];
    if (msg) alert(msg);

    const myUserId = [[${userId}]];
    let stompClient = null;

    function connect() {
        const socket = new SockJS("/ws-stomp");
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function () {
            stompClient.subscribe("/sub/user/" + myUserId + "/roomList", function (message) {
                const data = JSON.parse(message.body);
                updateRoomList(data);
            });
        });
    }

    function updateRoomList(data) {
        // data: { roomId, lastMessage, unreadCount, time, totalUnreadCount }

        const rowId = 'room-' + data.roomId;
        const roomRow = document.getElementById(rowId);

        if (roomRow) {
            // 1. 개별 방 업데이트
            const msgDiv = roomRow.querySelector(".last-msg");
            if (msgDiv) msgDiv.innerText = data.lastMessage;

            const badgeSpan = roomRow.querySelector(".badge");
            if (badgeSpan) {
                if (data.unreadCount > 0) {
                    badgeSpan.innerText = data.unreadCount;
                    badgeSpan.style.display = "inline-block";
                } else {
                    badgeSpan.style.display = "none";
                }
            }

            const timeSpan = roomRow.querySelector(".time-text");
            if (timeSpan && data.time) {
                timeSpan.innerText = data.time.substring(11, 16);
            }

            const listUl = document.getElementById("roomListUl");
            listUl.prepend(roomRow);
        } else {
            location.reload();
            return;
        }

        // 2. 전체 뱃지 업데이트
        const globalBadge = document.querySelector(".global-badge");
        const activeNavItem = document.querySelector(".nav-item.active");

        if (data.totalUnreadCount > 0) {
            if (globalBadge) {
                globalBadge.innerText = data.totalUnreadCount;
                globalBadge.style.display = "flex";
            } else if (activeNavItem) {
                const newBadge = document.createElement("span");
                newBadge.className = "global-badge";
                newBadge.innerText = data.totalUnreadCount;
                activeNavItem.appendChild(newBadge);
            }
        } else {
            if (globalBadge) globalBadge.style.display = "none";
        }
    }

    connect();

    /*]]>*/
</script>

</body>
</html>

app:
  storage:
    type: s3 # local | s3
  local:
    base-dir: /var/app/uploads
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_REGION:ap-northeast-2}
    prefix: ${AWS_S3_PREFIX:camnect}
    presign:
      upload-expiration-seconds: 3600   # 1hr
      download-expiration-seconds: 300 # 5분
  upload-ticket:
    expire-job-delay-ms: 900000  # 15분

  activity:
    attachments:
      max-files: 10
      max-file-size-mb: 20
      allowed-content-types:
        - application/pdf
        - image/jpeg
        - image/png
        - image/webp
  auth:
    email-verification:
      expiration-minutes: 30
      mail:
        subject: "CamNecT 이메일 인증번호"
  verification:
    document:
      max-file-size-mb: 10
      max-files: 3
      allowed-content-types:
        - application/pdf
        - image/jpeg
        - image/png
        - image/webp
      # storage-dir는 storage=local 일 때만 사용됨
      storage-dir: /var/app/uploads/verifications
  community:
    attachments:
      max-files: 3
      max-file-size-mb: 10
      allowed-content-types:
        - application/pdf
        - image/jpeg
        - image/png
        - image/webp
  portfolio:
    assets:
      max-files: 10
      max-file-size-mb: 20
      allowed-content-types:
        - image/jpeg
        - image/png
        - image/webp
        - application/pdf
    thumbnail:
      max-file-size-mb: 5
  point:
    reward:
      comment-selection: 200
      first-three-likes : 100
    cost:
      question-view: 100
  cdn:
    base-url: https://cdn.camnect.site
  gifticon:
    catalog-sync-cron: "0 0 3 * * *"   # 매일 03:00
    export-cron: "0 10 3 * * *"        # 매일 03:10
    export-dir: "/var/app/exports/gifticon"  # 로컬 저장 디렉토리 (EC2)
    export-mail:
      enabled: true
      to: camnect.official@gmail.com
      subject: "[CamNecT] 기프티콘 구매요청 엑셀"
      delete-after-send : true
    vendor:
      enabled: ${SENDB_ENABLED:false}
      base-url: ${SENDB_BASE_URL:https://vendor.example.com}
      mid: ${SENDB_MID:sendbee}
      secret-key: ${SENDB_SECRET_KEY:}
      cipher: ${SENDB_CIPHER:AES/ECB/PKCS5Padding}
      iv: ${SENDB_IV:}



spring:
  application:
    name: camnect-server

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/${DB_NAME:camnect}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQL_USER_NAME:camnect}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQL_USER_PASS:camnect1234}}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME} # 실제 이메일 주소
    password: ${MAIL_PASSWORD} # 앱 비밀번호 (2단계 인증 후 발급)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000


server:
  port: 8080
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 1209600000 #360000        # 6min
  refresh-token-expiration-ms: 1209600000   # 14day
  verification-token-expiration-ms: 259200000 #3day

security:
  interceptor:
    auth:
      enabled: true
    admin:
      enabled: true
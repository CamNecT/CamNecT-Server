services:
  app:
    image: ${DOCKER_USERNAME}/camnect-server:stage
    container_name: camnect-server-stage
    restart: always
    ports:
      - "127.0.0.1:8081:8080"
    env_file:
      - .env.stage
    volumes:
      - /etc/camnect/secrets/firebase-admin.json:/var/app/secrets/firebase-admin.json:ro
      - /home/ubuntu/app/exports/gifticon-stage:/var/app/exports/gifticon
    environment:
      SPRING_PROFILES_ACTIVE: stage
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=70.0
      GOOGLE_APPLICATION_CREDENTIALS: /var/app/secrets/firebase-admin.json